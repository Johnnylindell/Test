[build]
  command = "python3 scripts/build_site.py"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/blogg"
  to = "/artiklar.html"
  status = 301

[[redirects]]
  from = "/guider"
  to = "/guider.html"
  status = 301

[[redirects]]
  from = "/koprad"
  to = "/koprad.html"
  status = 301

[[redirects]]
  from = "/taggar"
  to = "/taggar.html"
  status = 301
